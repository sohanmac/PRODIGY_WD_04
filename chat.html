<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Bot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="chat">
  <div class="app-shell">
    <aside class="contacts-panel">
      <div class="contacts-header">
        <div>
          <p>Contacts</p>
          <span>Message a saved contact</span>
        </div>
        <input id="contactSearch" type="search" placeholder="Search contacts" />
      </div>
      <form id="addContactForm" class="add-contact-form">
        <input id="newContactName" type="text" placeholder="Contact name" autocomplete="name" />
        <input id="newContactPhone" type="tel" placeholder="Contact phone" autocomplete="tel" />
        <button type="submit">Add</button>
      </form>
      <p class="contact-note" id="contactNote">Add a contact to start messaging.</p>
      <div class="contact-list" id="contactList"></div>
    </aside>
    <main class="chat-panel">
      <div class="chat-header">
        <div class="chat-peer">
          <div class="avatar">CB</div>
          <div>
            <h2 id="chatTitle">Chat Bot</h2>
            <p id="chatSubtitle">Select a user to message</p>
          </div>
        </div>
        <button class="secondary-button" id="logoutButton" type="button">Logout</button>
      </div>
      <section class="chat-window" id="chatWindow"></section>
      <form class="composer" id="chatForm">
        <input id="messageInput" type="text" placeholder="Type a message" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
